
<div style="width:100%;background:#0a0a0a;border-radius:12px;overflow:hidden;position:relative;font-family:'Courier New',monospace;">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Interactive 360 degree video player with pan, zoom, and playback controls</h2>

  <div id="canvas-wrap" style="width:100%;aspect-ratio:16/9;position:relative;cursor:grab;user-select:none;overflow:hidden;">
    <canvas id="c360" style="width:100%;height:100%;display:block;"></canvas>
    <div id="overlay-msg" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(0,0,0,0.7);color:#fff;">
      <div style="font-size:36px;">&#9654;</div>
      <div style="font-size:14px;letter-spacing:2px;color:#aaa;">CLICK TO LOAD 360° VIDEO</div>
    </div>
    <div id="hud" style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.5);color:#0ff;font-size:11px;padding:6px 10px;border-radius:6px;letter-spacing:1px;display:none;">
      <span id="fov-hud">FOV: 75°</span> &nbsp;|&nbsp; <span id="pos-hud">PAN: 0°</span>
    </div>
    <div id="loading-bar" style="position:absolute;bottom:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#0ff,#0af);transition:width 0.3s;"></div>
  </div>

  <div id="controls" style="padding:14px 16px;background:#111;border-top:1px solid #1e1e1e;">
    <div style="display:flex;align-items:center;gap:0;margin-bottom:10px;">
      <span style="font-size:11px;color:#555;min-width:42px;" id="cur-time">0:00</span>
      <div style="flex:1;height:4px;background:#222;border-radius:2px;cursor:pointer;position:relative;" id="seek-bar">
        <div id="seek-fill" style="height:100%;background:#0ff;border-radius:2px;width:0%;pointer-events:none;"></div>
        <div id="seek-thumb" style="position:absolute;top:-4px;left:0%;width:12px;height:12px;background:#0ff;border-radius:50%;margin-left:-6px;pointer-events:none;box-shadow:0 0 6px #0ff88;"></div>
      </div>
      <span style="font-size:11px;color:#555;min-width:42px;text-align:right;" id="dur-time">0:00</span>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:6px;">
        <button onclick="seek(-10)" title="Backward 10s" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;">&#9664;&#9664; 10s</button>
        <button id="play-btn" onclick="togglePlay()" style="background:#0ff;border:none;color:#000;padding:7px 18px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px;letter-spacing:1px;">&#9654; PLAY</button>
        <button onclick="seek(10)" title="Forward 10s" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;">10s &#9654;&#9654;</button>
      </div>

      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:#555;letter-spacing:1px;">ZOOM</span>
          <button onclick="zoomBy(5)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;">+</button>
          <button onclick="zoomBy(-5)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;">-</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:#555;letter-spacing:1px;">VOL</span>
          <input type="range" min="0" max="1" step="0.05" value="1" id="vol-slider" oninput="setVol(this.value)" style="width:60px;accent-color:#0ff;" />
        </div>
        <button onclick="resetView()" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;letter-spacing:1px;">RESET</button>
      </div>
    </div>

    <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:11px;color:#555;letter-spacing:1px;">PAN</span>
      <button onclick="panBy(-15)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">&#8592; Left</button>
      <button onclick="panBy(15)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">Right &#8594;</button>
      <button onclick="tiltBy(-10)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">&#8593; Up</button>
      <button onclick="tiltBy(10)" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">Down &#8595;</button>
      <span style="font-size:11px;color:#333;margin-left:auto;">Drag to pan &bull; Scroll to zoom</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const VIDEO_URL = "https://karthick7246.github.io/TestingData/360VideoViewer/Test360V.mp4";
const canvas = document.getElementById('c360');
const wrap = document.getElementById('canvas-wrap');
const overlay = document.getElementById('overlay-msg');
const playBtn = document.getElementById('play-btn');
const seekFill = document.getElementById('seek-fill');
const seekThumb = document.getElementById('seek-thumb');
const seekBar = document.getElementById('seek-bar');
const curTime = document.getElementById('cur-time');
const durTime = document.getElementById('dur-time');
const hudEl = document.getElementById('hud');
const fovHud = document.getElementById('fov-hud');
const posHud = document.getElementById('pos-hud');
const loadBar = document.getElementById('loading-bar');

let renderer, scene, camera, sphere, video, animId;
let fov = 75, lon = 0, lat = 0;
let isDragging = false, lastX = 0, lastY = 0;
let started = false;

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function initThree() {
  renderer = new THREE.WebGLRenderer({canvas, antialias: true});
  renderer.setPixelRatio(window.devicePixelRatio);
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(fov, w/h, 0.1, 1000);

  video = document.createElement('video');
  video.crossOrigin = 'anonymous';
  video.src = VIDEO_URL;
  video.loop = false;
  video.muted = false;
  video.playsInline = true;
  video.preload = 'metadata';

  video.addEventListener('progress', () => {
    if(video.buffered.length > 0 && video.duration) {
      const pct = (video.buffered.end(video.buffered.length-1)/video.duration)*100;
      loadBar.style.width = pct + '%';
    }
  });
  video.addEventListener('loadedmetadata', () => {
    durTime.textContent = fmt(video.duration);
  });

  const tex = new THREE.VideoTexture(video);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  const geo = new THREE.SphereGeometry(500, 64, 32);
  geo.scale(-1, 1, 1);
  const mat = new THREE.MeshBasicMaterial({map: tex});
  sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  animate();
}

function animate() {
  animId = requestAnimationFrame(animate);
  if (video && !video.paused) {
    camera.fov = fov;
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();

    lat = Math.max(-85, Math.min(85, lat));
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    camera.target = new THREE.Vector3(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );
    camera.lookAt(camera.target);
    renderer.render(scene, camera);

    const pct = video.currentTime / video.duration * 100 || 0;
    seekFill.style.width = pct + '%';
    seekThumb.style.left = pct + '%';
    curTime.textContent = fmt(video.currentTime);

    fovHud.textContent = 'FOV: ' + Math.round(fov) + '°';
    posHud.textContent = 'PAN: ' + Math.round(lon) + '°';
  } else if (started) {
    camera.fov = fov;
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    lat = Math.max(-85, Math.min(85, lat));
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );
    renderer.render(scene, camera);
  }
}

function startPlayer() {
  if (!started) {
    started = true;
    initThree();
    overlay.style.display = 'none';
    hudEl.style.display = 'block';
    video.play().catch(()=>{});
    playBtn.textContent = '⏸ PAUSE';
  }
}

function togglePlay() {
  if (!started) { startPlayer(); return; }
  if (video.paused) {
    video.play();
    playBtn.textContent = '⏸ PAUSE';
  } else {
    video.pause();
    playBtn.textContent = '▶ PLAY';
  }
}

function seek(s) {
  if (!video) return;
  video.currentTime = Math.max(0, Math.min(video.duration||0, video.currentTime + s));
}

function zoomBy(d) {
  fov = Math.max(20, Math.min(120, fov - d));
  if (camera) { camera.fov = fov; camera.updateProjectionMatrix(); }
}

function panBy(d) { lon = (lon + d + 360) % 360; }
function tiltBy(d) { lat = Math.max(-85, Math.min(85, lat + d)); }

function resetView() {
  fov = 75; lon = 0; lat = 0;
  if (camera) { camera.fov = fov; camera.updateProjectionMatrix(); }
}

function setVol(v) { if (video) video.volume = parseFloat(v); }

overlay.addEventListener('click', startPlayer);
canvas.addEventListener('click', () => { if(!started) startPlayer(); });

wrap.addEventListener('mousedown', e => {
  if (!started) return;
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  wrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lon -= dx * 0.15; lat -= dy * 0.15;
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; wrap.style.cursor = 'grab'; });

wrap.addEventListener('touchstart', e => {
  if (!started) { startPlayer(); return; }
  if(e.touches.length === 1) { isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
}, {passive:true});
wrap.addEventListener('touchmove', e => {
  if(!isDragging || e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  lon-=dx*0.2; lat-=dy*0.2;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
}, {passive:true});
wrap.addEventListener('touchend', ()=>{ isDragging=false; });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  fov = Math.max(20, Math.min(120, fov + e.deltaY * 0.05));
  if (camera) { camera.fov = fov; camera.updateProjectionMatrix(); }
}, {passive:false});

seekBar.addEventListener('click', e => {
  if (!video || !video.duration) return;
  const r = seekBar.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  video.currentTime = pct * video.duration;
});

window.addEventListener('resize', () => {
  if (!renderer) return;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  if (camera) { camera.aspect = w/h; camera.updateProjectionMatrix(); }
});

video && (video.onended = () => { playBtn.textContent = '▶ PLAY'; });
</script>
