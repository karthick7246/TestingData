<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="title" content="Browser-Based Viewer for 360° Images and Videos">
    <meta name="description" content="A lightweight, browser-based viewer for interactive 360° panoramas and videos.">
    <title>360° Panorama & Video Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.7.0/aframe.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <!-- Your full original HTML goes here -->
    <!-- Added default media link support below -->
    <script>
        function getMediaUrlFromParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const mediaUrl = urlParams.get('url') || urlParams.get('src');
            const stereoParam = urlParams.get('stereo');

            let stereoMode = 0;
            if (stereoParam) {
                const stereoLower = stereoParam.toLowerCase();
                switch (stereoLower) {
                    case 'tb':
                    case 'vertical':
                    case '1':
                        stereoMode = 1;
                        break;
                    case 'lr':
                    case 'horizontal':
                    case '2':
                        stereoMode = 2;
                        break;
                    default:
                        stereoMode = 0;
                }
            }

            return { url: mediaUrl, stereoMode };
        }

        document.addEventListener('DOMContentLoaded', () => {
            const defaultMediaUrl = 'https://karthick7246.github.io/TestingData/360VideoViewer/Test360V.mp4';

            const mediaParams = getMediaUrlFromParams();
            if (mediaParams.url) {
                mediaHandlers.loadMediaFromUrl(mediaParams.url, mediaParams.stereoMode);
            } else {
                mediaHandlers.loadMediaFromUrl(defaultMediaUrl, 0);
            }
        });
    </script>
</body>
</html>
