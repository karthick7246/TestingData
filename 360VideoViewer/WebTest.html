<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360° Video Viewer</title>

  <link rel="stylesheet" href="https://vjs.zencdn.net/8.23.4/video-js.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/videojs-vr@1.10.1/dist/videojs-vr.css" />

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #vr-video,
    .video-js {
      width: 100% !important;
      height: 100% !important;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      z-index: 1000;
      font-size: 20px;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1001;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 10px 16px;
      border-radius: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="title">Interactive 360° Video Viewer</div>
    <div id="loading">Loading 360° Experience...</div>

    <video
      id="vr-video"
      class="video-js vjs-default-skin vjs-big-play-centered"
      controls
      playsinline
      webkit-playsinline
      preload="auto"
      crossorigin="anonymous">
      <source src="https://karthick7246.github.io/TestingData/360VideoViewer/Test360V.mp4" type="video/mp4">
      <p>Your browser does not support HTML5 video.</p>
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-vr@1.10.1/dist/videojs-vr.min.js"></script>

  <script>
    window.addEventListener('load', function () {
      const loading = document.getElementById('loading');

      const player = videojs('vr-video', {
        fluid: false,
        responsive: false,
        controls: true,
        autoplay: false,
        preload: 'auto'
      });

      player.ready(function () {
        player.vr({
          projection: '360',
          debug: false,
          motionControls: true,
          forceCardboard: false
        });

        player.one('loadedmetadata', function () {
          loading.style.display = 'none';
        });

        player.on('error', function () {
          const err = player.error();
          console.error('Video.js Error:', err);
          loading.innerHTML = 'Error loading video. Please check the video URL or format.';
        });
      });
    });
  </script>
</body>
</html>
