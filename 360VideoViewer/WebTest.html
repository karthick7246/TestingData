<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Video Viewer</title>

  <link rel="stylesheet" href="https://vjs.zencdn.net/8.23.4/video-js.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/videojs-vr@1.10.1/dist/videojs-vr.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .viewer-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .video-js {
      width: 100%;
      height: 100%;
    }

    .vjs-control-bar {
      background: rgba(0, 0, 0, 0.6) !important;
    }

    .title-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      pointer-events: none;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 999;
      color: white;
      font-size: 20px;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="title-overlay">Interactive 360° Video Viewer</div>
    <div id="loading" class="loading-overlay">Loading 360° Experience...</div>

    <video
      id="vr-video"
      class="video-js vjs-default-skin"
      controls
      playsinline
      preload="auto"
      crossorigin="anonymous"
      data-setup='{}'>
      <source
        src="https://karthick7246.github.io/TestingData/360VideoViewer/Test360V.mp4"
        type="video/mp4" />
      <p class="vjs-no-js">
        To view this video please enable JavaScript.
      </p>
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-vr@1.10.1/dist/videojs-vr.min.js"></script>

  <script>
    const player = videojs('vr-video', {
      fluid: true,
      controlBar: {
        volumePanel: { inline: false },
        fullscreenToggle: true,
        pictureInPictureToggle: false
      }
    });

    player.ready(function () {
      player.vr({
        projection: 'AUTO',
        debug: false,
        forceCardboard: false,
        motionControls: true
      });

      const loading = document.getElementById('loading');

      player.on('loadeddata', () => {
        loading.classList.add('hidden');
      });

      player.on('error', () => {
        loading.innerHTML = 'Unable to load the 360° video.';
      });
    });

    // Optional keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'Space':
          e.preventDefault();
          if (player.paused()) player.play();
          else player.pause();
          break;
        case 'KeyF':
          player.requestFullscreen();
          break;
        case 'KeyM':
          player.muted(!player.muted());
          break;
      }
    });
  </script>
</body>
</html>
